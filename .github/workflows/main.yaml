# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  issues: write
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: Development
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # This handles caching automatically!

      - name: Build/ Analyse with Maven
        env:
          LANG: en_GB.UTF-8
          LC_ALL: en_GB.UTF-8
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ vars.SONAR_ORG }}
        run: |
          mvn verify -Duser.language=en -Duser.country=GB org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization="$SONAR_ORG" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.coverage.exclusions=**/dto/**,**/util/** \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Build Docker Image
        run: docker build . -t caseworker-service:latest

      - name: Docker Scout Scan
        uses: docker/scout-action@aceeb83b88f2ae54376891227858dda7af647183 #v1.18.2
        with:
          image: caseworker-service:latest
          dockerhub-user: ${{ secrets.DOCKER_USER }}
          dockerhub-password: ${{ secrets.DOCKER_SECRET }}
          command: quickview, cves
          only-severities: critical, high
          exit-code: true
          sarif-file: scout-report.sarif

      - name: Upload Artifact
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: docker-scout-findings
          path: scout-report.sarif