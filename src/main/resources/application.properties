spring.application.name=caseworker-service

# Automatically create tables based on JPA entities
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=create-drop
# Wait until after create schema before execute.
spring.jpa.defer-datasource-initialization=true

server.port=${SPRING_SERVER_PORT:8081}

jwt.security.key=${JWT_SECRET_KEY:X9f$7vL!pQz@3rT#bWm^2eK&uYh*6nJgZsLdCqAoEiTxV}
jwt.security.timeout=3000000

# SQL Logging Configuration
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
