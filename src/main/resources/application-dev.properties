# Automatically create tables based on JPA entities
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
# Wait until after create schema before execute.
spring.jpa.defer-datasource-initialization=true

# SQL Logging Configuration
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

auth.jwt.secret=${JWT_SECRET_KEY:MTY5M2ZlZTk4YmQ0M2M1YjA3ZTM0ZDAyM2M2ZDIzY2U=}
#The timeout should be less in production. This is for debugging purpose
auth.jwt.timeout=1h